name: CI

on:
  push:
    branches: [main, upstream-sync-*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...

  windows-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./...
      - run: go build ./cmd/server
      - run: go build ./cmd/chat
      - run: go build ./cmd/cookies
      - run: go build ./cmd/start
      - run: go build ./cmd/stream-capture